
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poom Lost & Found Pro X</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--card2:#334155;
--text:#f8fafc;
--pink:#ec4899;
--blue:#3b82f6;
--green:#22c55e;
--red:#ef4444;
--yellow:#eab308;
--shadow:0 10px 30px rgba(0,0,0,.25);
}

.light{
--bg:#f1f5f9;
--card:#ffffff;
--card2:#e2e8f0;
--text:#0f172a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
background:linear-gradient(135deg,#1e3a8a,#ec4899);
min-height:100vh;
color:var(--text);
transition:.3s;
}

header{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(15,23,42,.75);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:28px;
font-weight:700;
}

.top-right{
display:flex;
align-items:center;
gap:12px;
position:relative;
}

.icon-btn{
border:none;
background:var(--card);
color:var(--text);
padding:12px 14px;
border-radius:14px;
cursor:pointer;
font-size:16px;
transition:.25s;
}

.icon-btn:hover{
transform:translateY(-2px);
}

.profile-btn{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,var(--blue),var(--pink));
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.dropdown{
position:absolute;
top:65px;
right:0;
background:var(--card);
border-radius:16px;
overflow:hidden;
min-width:200px;
box-shadow:var(--shadow);
display:none;
}

.dropdown button{
width:100%;
padding:14px;
background:none;
border:none;
color:var(--text);
text-align:left;
cursor:pointer;
font-size:15px;
}

.dropdown button:hover{
background:rgba(255,255,255,.08);
}

.container{
width:min(95%,1300px);
margin:auto;
padding:25px 0;
}

.hero{
background:rgba(255,255,255,.08);
padding:30px;
border-radius:30px;
margin-bottom:25px;
backdrop-filter:blur(10px);
box-shadow:var(--shadow);
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:.85;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin:25px 0;
}

.stat{
background:var(--card);
padding:25px;
border-radius:24px;
text-align:center;
box-shadow:var(--shadow);
}

.stat h2{
font-size:38px;
margin-bottom:5px;
}

.search-area{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.search-area input,
.search-area select{
padding:15px;
border:none;
border-radius:16px;
background:var(--card);
color:var(--text);
}

.search-btn{
background:linear-gradient(135deg,var(--blue),var(--pink));
color:white;
font-weight:600;
}

.panel{
display:none;
background:var(--card);
padding:25px;
border-radius:30px;
margin-bottom:30px;
box-shadow:var(--shadow);
}

.panel h2{
margin-bottom:20px;
}

.panel input,
.panel textarea,
.panel select{
width:100%;
padding:15px;
margin-bottom:14px;
border:none;
border-radius:16px;
background:var(--card2);
color:var(--text);
}

.panel textarea{
min-height:120px;
resize:none;
}

.panel button{
padding:15px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,var(--blue),var(--pink));
color:white;
font-weight:600;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:22px;
}

.card{
background:var(--card);
border-radius:26px;
overflow:hidden;
box-shadow:var(--shadow);
animation:fade .3s ease;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
background:#111827;
}

.content{
padding:20px;
}

.content h2{
margin-bottom:10px;
}

.badges{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:15px 0;
}

.badge{
padding:8px 14px;
border-radius:999px;
font-size:13px;
color:white;
font-weight:500;
}

.red{background:var(--red);}
.green{background:var(--green);}
.yellow{background:var(--yellow);}
.blue{background:var(--blue);}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:18px;
}

.actions button{
padding:11px 15px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:500;
}

.edit-btn{background:#f59e0b;color:white;}
.delete-btn{background:#dc2626;color:white;}

.comment-box{
margin-top:20px;
padding-top:15px;
border-top:1px solid rgba(255,255,255,.08);
}

.comment{
background:rgba(255,255,255,.08);
padding:10px;
border-radius:12px;
margin-top:10px;
}

.comment-box input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
}

.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.55);
z-index:1000;
}

.modal-box{
width:min(92%,380px);
background:white;
color:black;
padding:30px;
border-radius:24px;
}

.modal-box input{
width:100%;
padding:14px;
margin:15px 0;
border:1px solid #cbd5e1;
border-radius:12px;
}

.modal-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

.empty{
text-align:center;
padding:50px;
opacity:.7;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<header>
<div class="logo">💙 Poom Lost & Found Pro X</div>

<div class="top-right">
<button class="icon-btn" onclick="toggleTheme()">🌙</button>

<div class="profile-btn" onclick="toggleDropdown()">👤</div>

<div class="dropdown" id="dropdown">
<button onclick="setUserMode()">👥 ผู้ใช้ทั่วไป</button>
<button onclick="openLogin()">🛡️ Admin</button>
</div>
</div>
</header>

<div class="container">

<div class="hero">
<h1>ระบบค้นหาของหายมาตรฐานใหม่</h1>
<p>ค้นหา แจ้งของหาย จัดการโพสต์ และระบบแอดมินครบถ้วน</p>
</div>

<div class="stats">
<div class="stat">
<h2 id="totalPosts">0</h2>
<p>โพสต์ทั้งหมด</p>
</div>

<div class="stat">
<h2 id="returnedItems">0</h2>
<p>ได้คืนแล้ว</p>
</div>

<div class="stat">
<h2 id="missingItems">0</h2>
<p>ยังหาไม่เจอ</p>
</div>
</div>

<div class="search-area">
<input type="text" id="searchName" placeholder="ค้นหาชื่อของหาย">
<input type="date" id="searchDate">

<select id="searchCategory">
<option value="">ทุกหมวดหมู่</option>
<option>โทรศัพท์</option>
<option>โน้ตบุ๊ก</option>
<option>กระเป๋า</option>
<option>กุญแจ</option>
<option>เอกสาร</option>
<option>อื่นๆ</option>
</select>

<select id="searchStatus">
<option value="">ทุกสถานะ</option>
<option>ยังหาไม่เจอ</option>
<option>กำลังติดต่อเจ้าของ</option>
<option>ได้คืนแล้ว</option>
</select>

<button class="icon-btn search-btn" onclick="searchPosts()">🔍 ค้นหา</button>
</div>

<div class="panel" id="adminPanel">
<h2>🛠️ ระบบจัดการโพสต์</h2>

<input type="text" id="itemName" placeholder="ชื่อสิ่งของ">
<input type="date" id="itemDate">
<input type="file" id="itemImage" accept="image/*">
<textarea id="itemDesc" placeholder="รายละเอียด"></textarea>

<select id="itemCategory">
<option>โทรศัพท์</option>
<option>โน้ตบุ๊ก</option>
<option>กระเป๋า</option>
<option>กุญแจ</option>
<option>เอกสาร</option>
<option>อื่นๆ</option>
</select>

<select id="itemStatus">
<option>ยังหาไม่เจอ</option>
<option>กำลังติดต่อเจ้าของ</option>
<option>ได้คืนแล้ว</option>
</select>

<button onclick="addPost()">➕ เพิ่มโพสต์</button>
</div>

<div class="grid" id="posts"></div>

</div>

<div class="modal" id="loginBox">
<div class="modal-box">
<h2>เข้าสู่ระบบแอดมิน</h2>
<input type="password" id="password" placeholder="กรอกรหัสผ่าน">
<button onclick="login()">เข้าสู่ระบบ</button>
<p id="error" style="color:red;margin-top:10px;"></p>
</div>
</div>

<script>

let isAdmin = false;

let posts = JSON.parse(localStorage.getItem("poom_posts")) || [
{
name:"iPhone 15",
date:"2026-05-20",
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop",
desc:"หายบริเวณโรงอาหาร",
category:"โทรศัพท์",
status:"ยังหาไม่เจอ",
likes:0,
comments:["เจอคล้ายกันที่อาคาร B"]
}
];

function save(){
localStorage.setItem("poom_posts",JSON.stringify(posts));
}

function badge(status){
if(status==="ยังหาไม่เจอ") return "red";
if(status==="กำลังติดต่อเจ้าของ") return "yellow";
return "green";
}

function render(data = posts){

const box = document.getElementById("posts");

document.getElementById("totalPosts").innerText = posts.length;

document.getElementById("returnedItems").innerText =
posts.filter(p=>p.status==="ได้คืนแล้ว").length;

document.getElementById("missingItems").innerText =
posts.filter(p=>p.status==="ยังหาไม่เจอ").length;

if(data.length===0){
box.innerHTML = '<div class="empty">ไม่พบข้อมูล</div>';
return;
}

box.innerHTML = data.map((p,index)=>`
<div class="card">
<img src="${p.image || 'https://via.placeholder.com/500x300?text=No+Image'}">

<div class="content">
<h2>${p.name}</h2>

<p>📅 ${p.date}</p>

<div class="badges">
<div class="badge blue">${p.category}</div>
<div class="badge ${badge(p.status)}">${p.status}</div>
</div>

<p>${p.desc}</p>

<div class="actions">

<button onclick="likePost(${index})">❤️ ${p.likes}</button>

<button onclick="sharePost('${p.name}')">🔗 แชร์</button>

${isAdmin ? `<button class="edit-btn" onclick="editPost(${index})">✏️ แก้ไข</button>` : ''}

${isAdmin ? `<button class="delete-btn" onclick="deletePost(${index})">🗑️ ลบ</button>` : ''}

</div>

<div class="comment-box">
<h4>💬 ความคิดเห็น</h4>

${p.comments.map(c=>`<div class="comment">${c}</div>`).join("")}

<input placeholder="พิมพ์ความคิดเห็น..."
onkeypress="if(event.key==='Enter'){addComment(${index},this.value);this.value='';}">
</div>

</div>
</div>
`).join("");
}

function addPost(){

const file = document.getElementById("itemImage").files[0];

const postData = {
name:itemName.value,
date:itemDate.value,
desc:itemDesc.value,
category:itemCategory.value,
status:itemStatus.value,
likes:0,
comments:[]
};

if(file){

const reader = new FileReader();

reader.onload = function(e){
postData.image = e.target.result;
posts.unshift(postData);
save();
render();
clearForm();
};

reader.readAsDataURL(file);

}else{
postData.image = "";
posts.unshift(postData);
save();
render();
clearForm();
}
}

function clearForm(){
itemName.value="";
itemDate.value="";
itemDesc.value="";
itemImage.value="";
}

function deletePost(i){

if(confirm("ยืนยันการลบโพสต์?")){
posts.splice(i,1);
save();
render();
}
}

function editPost(i){

let p = posts[i];

const newName = prompt("ชื่อ",p.name);
if(newName !== null) p.name = newName;

const newDesc = prompt("รายละเอียด",p.desc);
if(newDesc !== null) p.desc = newDesc;

const newStatus = prompt("สถานะ",p.status);
if(newStatus !== null) p.status = newStatus;

save();
render();
}

function likePost(i){
posts[i].likes++;
save();
render();
}

function addComment(i,text){

if(text.trim()==="") return;

posts[i].comments.push(text);

save();
render();
}

function searchPosts(){

const name = document.getElementById("searchName").value.toLowerCase();
const date = document.getElementById("searchDate").value;
const category = document.getElementById("searchCategory").value;
const status = document.getElementById("searchStatus").value;

const filtered = posts.filter(p=>{

const ok1 = p.name.toLowerCase().includes(name);
const ok2 = date ? p.date===date : true;
const ok3 = category ? p.category===category : true;
const ok4 = status ? p.status===status : true;

return ok1 && ok2 && ok3 && ok4;
});

render(filtered);
}

function toggleDropdown(){
const d = document.getElementById("dropdown");
d.style.display = d.style.display==="block" ? "none" : "block";
}

function setUserMode(){
isAdmin = false;
adminPanel.style.display = "none";
render();
toggleDropdown();
}

function openLogin(){
document.getElementById("loginBox").style.display="flex";
toggleDropdown();
}

function login(){

const pwd = document.getElementById("password").value;

if(pwd==="poom"){

isAdmin = true;

document.getElementById("adminPanel").style.display="block";

document.getElementById("loginBox").style.display="none";

render();

}else{
document.getElementById("error").innerText = "รหัสผ่านไม่ถูกต้อง";
}
}

function toggleTheme(){
document.body.classList.toggle("light");
}

function sharePost(name){

navigator.clipboard.writeText("พบของหาย: " + name);

alert("คัดลอกข้อความแชร์แล้ว");
}

window.onclick = function(e){
if(e.target === loginBox){
loginBox.style.display = "none";
}
}

render();

</script>

</body>
</html>
